version: "3.8"

services:
  # Redis Database (Hỗ trợ Realtime Socket.io cho WorkHub)
  redis:
    image: redis:7-alpine
    container_name: workhub_redis
    ports:
      - "6379:6379"
    restart: always

  # Backend Node (JS) - Core API & Realtime
  backend-node:
    build: ./backend-node
    container_name: workhub_node
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./backend-node:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

  # Frontend React
  frontend:
    build: ./frontend
    container_name: workhub_frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - VITE_NODE_API_URL=http://localhost:5000
      - VITE_PYTHON_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    command: sh -c "npm install && npm run dev"
